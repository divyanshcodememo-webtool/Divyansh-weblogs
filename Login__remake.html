<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap');

html, body{
    width:100%;
    height:100%;
    margin:0;
    overflow:hidden;

    background-image:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
    background-size:cover;
    background-position:center;
}

/* MAIN BOX */
#box{
    width:90%;
    max-idth:1400px;
    height:85%;
    max-height:900px;

    background:rgba(255,255,255,0.35);
    backdrop-filter: blur(18px);
    border:4px solid rgba(255,255,255,0.7);
    border-radius:16px;

    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
}

/* TITLE */
#title{
    position:absolute;
    top:25px;
    left:40px;
    font-family:Poppins;
    font-size:clamp(26px,4vw,42px);
    font-weight:700;
}

/* INPUTS */
.inputBox{
    position:absolute;
    left:40px;
    right:40px;
}

#nameBox{ top:95px; }
#mobileBox{ top:170px; }
#countryBox{ top:245px; }

input, select{
    width:100%;
    padding:16px;
    font-size:18px;
    border:none;
    outline:none;
    border-radius:10px;
    background:rgba(255,255,255,0.6);
}

/* BUTTONS */
#btnRow{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:15px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
    background:rgba(255,255,255,0.35);
}

/* MESSAGE */
#msg{
    position:absolute;
    bottom:85px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.5);
    color:#fff;
    padding:6px 12px;
    border-radius:8px;
    opacity:0;
    transition:0.3s;
}

/* DASHBOARD */
#dashboard{
    position:absolute;
    bottom:-100%;
    left:0;
    width:100%;
    height:50%;
    background:rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
    transition:0.5s ease;
    color:white;
    padding:20px;
    overflow-y:auto;
}

#dashboard.open{
    bottom:0;
}

/* CLOSE */
#closeDash{
    position:absolute;
    top:10px;
    right:15px;
    font-size:22px;
    cursor:pointer;
}

/* LOGIN LIST */
.logItem{
    background:rgba(255,255,255,0.1);
    padding:10px;
    margin:8px 0;
    border-radius:8px;
}

/* DASH BUTTONS INSIDE */
#dashControls{
    display:flex;
    gap:10px;
    margin:10px 0;
}

/* PASSWORD POPUP */
#passPopup{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

#passBox{
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

#passBox input{
    padding:10px;
    width:80%;
}

.smallBtn{
    margin-top:10px;
    padding:10px 18px;
}
</style>
</head>

<body>

<div id="box">

    <div id="title">LOGIN - DIVYANSH</div>

    <div class="inputBox" id="nameBox">
        <input id="name" placeholder="Enter name">
    </div>

    <div class="inputBox" id="mobileBox">
        <input id="mobile" type="tel" inputmode="numeric" placeholder="Enter mobile">
    </div>

    <div class="inputBox" id="countryBox">
        <select id="country">
            <option value="" disabled selected>Select country</option>
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
        </select>
    </div>

    <div id="msg"></div>

    <div id="btnRow">
        <button onclick="validate()">LOGIN</button>
        <button onclick="resetForm()">RESET</button>
        <button onclick="showPassPopup()">DASHBOARD</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
        <div id="closeDash" onclick="closeDash()">✖</div>

        <h3>LOGIN HISTORY</h3>

        <!-- NEW DASHBOARD CONTROLS -->
        <div id="dashControls">
            <button onclick="clearDashboard()">RESET DATA</button>
        </div>

        <div id="list"></div>
    </div>

    <!-- PASSWORD POPUP -->
    <div id="passPopup">
        <div id="passBox">
            <h3>Enter Password</h3>
            <input id="passInput" type="password" placeholder="Password">

            <br>

            <button class="smallBtn" onclick="checkPass()">OPEN</button>
            <button class="smallBtn" onclick="cancelPass()">CANCEL</button>
        </div>
    </div>

</div>

<script>
const msg=document.getElementById("msg");
const list=document.getElementById("list");
const dash=document.getElementById("dashboard");
const popup=document.getElementById("passPopup");

function showMsg(t){
    msg.innerText=t;
    msg.style.opacity=1;
    setTimeout(()=>msg.style.opacity=0,1200);
}

/* SAVE LOGIN */
function validate(){
    const n=document.getElementById("name").value;
    const m=document.getElementById("mobile").value;
    const c=document.getElementById("country").value;

    if(!n||!m||!c){
        showMsg("Fill all details");
        return;
    }

    let data=JSON.parse(localStorage.getItem("logins"))||[];
    data.push({name:n,mobile:m,country:c});
    localStorage.setItem("logins",JSON.stringify(data));

    showMsg("Login Saved ✓");
}

/* RESET FORM */
function resetForm(){
    document.getElementById("name").value="";
    document.getElementById("mobile").value="";
    document.getElementById("country").selectedIndex=0;
}

/* LOAD HISTORY */
function loadHistory(){
    const data=JSON.parse(localStorage.getItem("logins"))||[];
    list.innerHTML="";
    data.forEach((d,i)=>{
        list.innerHTML+=`
        <div class="logItem">
        #${i+1}<br>
        ${d.name} | ${d.mobile} | ${d.country}
        </div>`;
    });
}

/* CLEAR DASHBOARD DATA */
function clearDashboard(){
    localStorage.removeItem("logins");
    loadHistory();
    showMsg("Dashboard Reset ✓");
}

/* PASSWORD */
function showPassPopup(){
    popup.style.display="flex";
}

function checkPass(){
    const pass=document.getElementById("passInput").value;

    if(pass==="divyansh"){
        popup.style.display="none";
        loadHistory();
        dash.classList.add("open");
        showMsg("Dashboard Unlocked ✓");
    }else{
        showMsg("Wrong Password ❌");
    }
}

function cancelPass(){
    popup.style.display="none";
    document.getElementById("passInput").value="";
    showMsg("Cancelled");
}

/* CLOSE DASH */
function closeDash(){
    dash.classList.remove("open");
}
</script>

</body>
</html>
